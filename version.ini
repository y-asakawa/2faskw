# 2FAS-KW build and release version settings.
#
# scripts/build-plugin-package.sh reads this file and injects these values into:
# - Maven project.version via -Drevision
# - plugin distribution directory and ZIP names
# - Admin Tools distribution directory and ZIP names
# - plugin compatibility metadata
# - bootstrap plugin.properties
# - packaged OpenAPI and documentation files

VERSION=1.2.0
ARTIFACT_ID=2faskw-idp-plugin
ADMIN_ARTIFACT_ID=2faskw-admin-tools

PLUGIN_ID=io.github.yasakawa.faskw.authn.graphicalmatrix
PLUGIN_NAME=2FAS-KW for Shibboleth IdP
SUPPORT_LEVEL=Current

# This is a reserved URL and design value for future official distribution; it is currently still unofficial.
DOWNLOAD_BASE_URL=https://github.com/y-asakawa/2faskw/releases/download
PLUGIN_METADATA_URL=https://raw.githubusercontent.com/y-asakawa/2faskw/main/plugin-metadata/graphicalmatrix-plugin.properties

IDP_VERSION_MIN=5.2.1
IDP_VERSION_MAX=5.2.3
JAVA_VERSION_MIN=21
JETTY_VERSION_MIN=12

REQUIRED_MODULES=idp.authn.Password,idp.authn.MFA
OPTIONAL_PLUGINS=net.shibboleth.idp.plugin.authn.totp,net.shibboleth.idp.plugin.authn.webauthn
API_DEFAULT=disabled
DATABASE_DEFAULT=PostgreSQL
