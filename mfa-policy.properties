# GraphicalMatrix MFA policy.
#
# default rule:
#   require = require GraphicalMatrix
#   bypass  = bypass GraphicalMatrix
graphicalmatrix.mfa.default = require

# SP entityIDs matched by the forceSPs rule require MFA.
# Place forceSPs before bypass rules in policyOrder to give it priority.
# Example:
# graphicalmatrix.mfa.forceSPs = https://sensitive.example.org/shibboleth
graphicalmatrix.mfa.forceSPs =

# Rules are evaluated from left to right and the first decision wins.
# Keep all six rule names exactly once and keep default last.
graphicalmatrix.mfa.policyOrder = forceSPs,bypassSPs,bypassSpCidrs,bypassNetwork,requiredSPs,default

# SP entityIDs matched by the bypassSPs rule bypass MFA.
# Example:
# graphicalmatrix.mfa.bypassSPs = https://password-only.example.org/shibboleth
graphicalmatrix.mfa.bypassSPs =

# IPv4 CIDR ranges that bypass GraphicalMatrix only for the matching SP entityID.
# Rule format: <SP entityID>|<CIDR>[,<CIDR>][;<SP entityID>|<CIDR>[,<CIDR>]]
# Use /32 for one IPv4 address. This does not affect other SPs.
# Example:
# graphicalmatrix.mfa.bypassSpCidrs = https://sp1.example.org/shibboleth|192.168.10.0/24;https://sp2.example.org/shibboleth|10.20.0.0/16,10.21.0.0/16
graphicalmatrix.mfa.bypassSpCidrs =

# If this list is non-empty, requiredSPs requires MFA for listed SP entityIDs
# and bypasses MFA for all other SPs when the rule is evaluated.
# Example:
# graphicalmatrix.mfa.requiredSPs = https://sp.example.org/simplesaml
graphicalmatrix.mfa.requiredSPs =

# Exact IPv4 or IPv6 client IPs matched by the bypassNetwork rule bypass MFA.
# Example:
# graphicalmatrix.mfa.bypassIPs = 127.0.0.1,192.0.2.65
graphicalmatrix.mfa.bypassIPs =

# IPv4 CIDR ranges matched by the bypassNetwork rule bypass MFA.
# Example:
# graphicalmatrix.mfa.bypassCIDRs = 10.0.0.0/8,192.0.2.0/16
graphicalmatrix.mfa.bypassCIDRs =

# Use X-Forwarded-For / X-Real-IP instead of request.getRemoteAddr().
# Enable only when all IdP access is guaranteed to pass through a trusted
# reverse proxy/LB and the proxy overwrites client IP headers.
# Keep false if clients can reach the IdP directly.
graphicalmatrix.mfa.useForwardedFor = false
