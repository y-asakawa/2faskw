name: Java CI with Maven

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
      - "docs/**"
      - "LICENSE"
      - "NOTICE"
      - "*.png"
      - ".github/dependabot.yml"
      - ".github/workflows/maven.yml"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
      - "docs/**"
      - "LICENSE"
      - "NOTICE"
      - "*.png"
      - ".github/dependabot.yml"
      - ".github/workflows/maven.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build release ZIPs
        run: ./scripts/build-plugin-package.sh
