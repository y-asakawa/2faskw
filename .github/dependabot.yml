version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "maven"
      - "security"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      shibboleth-stack:
        patterns:
          - "net.shibboleth*"
          - "org.opensaml*"
      runtime-libraries:
        patterns:
          - "com.google.zxing:*"
          - "org.postgresql:*"
          - "com.zaxxer:*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "deps"
      include: "scope"
