#### GraphicalMatrix WebAuthn LDAP StorageService properties

# This file is used only when WebAuthn credential storage is switched to
# GraphicalMatrixLDAPStorageService.
# DB/JDBC storage remains the recommended default for WebAuthn credentials.

# Common LDAP connection settings. Omitted values fall back to ldap.properties.
#graphicalmatrix.webauthn.ldap.url = ldaps://127.0.0.1:686
#graphicalmatrix.webauthn.ldap.bindDN = CN=graphicalmatrix-writer,OU=system,DC=example,DC=jp
#graphicalmatrix.webauthn.ldap.bindCredentialFile = %{idp.home}/credentials/graphicalmatrix-ldap-bind.secret
#graphicalmatrix.webauthn.ldap.connectTimeout = PT3S
#graphicalmatrix.webauthn.ldap.responseTimeout = PT3S

# plaintext keeps the WebAuthn credential JSON compatible with Shibboleth's
# StorageService model. Protect this attribute with LDAP ACLs.
graphicalmatrix.webauthn.ldap.value.storage = plaintext

# Recommended LDAP layout: store each StorageService record as an entry under a
# dedicated subtree. This models the StorageService context + id compound key.
graphicalmatrix.webauthn.ldap.layout = subtree
graphicalmatrix.webauthn.ldap.baseDN = OU=WebAuthnStorage,DC=example,DC=jp
graphicalmatrix.webauthn.ldap.recordRdnAttr = cn
graphicalmatrix.webauthn.ldap.objectClasses = top,organizationalRole,extensibleObject
graphicalmatrix.webauthn.ldap.attr.context = gmStorageContext
graphicalmatrix.webauthn.ldap.attr.id = gmStorageId
graphicalmatrix.webauthn.ldap.attr.expires = gmStorageExpires
graphicalmatrix.webauthn.ldap.attr.value = gmStorageValue
graphicalmatrix.webauthn.ldap.attr.version = gmStorageVersion

# Alternative layout: store one WebAuthn record on the user entry.
# This is suitable only when one user has one WebAuthn StorageService record.
#graphicalmatrix.webauthn.ldap.layout = user-entry
#graphicalmatrix.webauthn.ldap.userBaseDN = OU=people,DC=example,DC=jp
#graphicalmatrix.webauthn.ldap.userFilter = (cn={id})
#graphicalmatrix.webauthn.ldap.userSubtreeSearch = true
